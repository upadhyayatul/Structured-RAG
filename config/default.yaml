project:
  name: upsc-rag
  processed_dir: data/processed

parsing:
  # Skip front matter before main content (pages are 1-based)
  content_start_page: null  # set per book in books/*.yaml

chunking:
  child_chunk_tokens: 600
  child_chunk_overlap: 80
  min_chunk_chars: 200

indexing:
  collection_name: upsc_polity
  qdrant_url: http://localhost:6333
  embedding_model: text-embedding-3-large
  embedding_dim: 3072
  embed_batch_size: 100

retrieval:
  top_k: 30
  rerank_top_k: 8
  rewrite:
    enabled: true          # LLM query rewriting: expand synonyms/abbreviations, multi-query retrieval
    num_variants: 3        # number of rephrasings to add alongside the original query
    model: gpt-4.1-nano
    score_threshold: 0.55  # gate: skip rewrite when original query's top dense cosine >= this (first pass already good)
  graph:                   # Graph-RAG expansion: surface cross-referenced sections via shared Articles
    enabled: false         # no-op on this corpus (article numbers absent from prose sections); see progress.json
    seed_sections: 5       # use the top-N fused sections as expansion seeds
    max_neighbors: 3       # add at most this many graph-related sections per query
    rrf_weight: 1.0        # scales the graph neighbours' RRF contribution into the fusion
  catalog:                 # attribute each chapter's 'Articles ... at a Glance' table to its sections
    enabled: true          # recovers article numbers PDF extraction stripped from the catalogs

generation:
  model: gpt-4o-mini
  temperature: 0.2
  max_tokens: 1024

