project:
  name: upsc-rag
  processed_dir: data/processed

parsing:
  # Skip front matter before main content (pages are 1-based)
  content_start_page: null  # set per book in books/*.yaml

chunking:
  child_chunk_tokens: 600
  child_chunk_overlap: 80
  min_chunk_chars: 200

indexing:
  collection_name: upsc_polity
  qdrant_url: http://localhost:6333
  embedding_model: text-embedding-3-large
  embedding_dim: 3072
  embed_batch_size: 100

retrieval:
  top_k: 30
  rerank_top_k: 8
  exclude_section_titles: []   # e.g. ["Notes and References"] to drop bibliographic sections. Left OFF: dedup already stops Notes flooding, and excluding them regresses MRR/recall on the coarse-labelled gold
  relevance_floor: 0.30    # off-topic gate: if the query's top dense cosine < this, skip generation and return an out-of-scope reply (0 disables)
  rewrite:
    enabled: true          # LLM query rewriting: expand synonyms/abbreviations, multi-query retrieval
    num_variants: 3        # number of rephrasings to add alongside the original query
    model: gpt-4.1-nano
    score_threshold: 0.55  # gate: skip rewrite when original query's top dense cosine >= this (first pass already good)
  graph:                   # Graph-RAG expansion: surface cross-referenced sections via shared Articles
    enabled: false         # no-op on this corpus (article numbers absent from prose sections); see progress.json
    seed_sections: 5       # use the top-N fused sections as expansion seeds
    max_neighbors: 3       # add at most this many graph-related sections per query
    rrf_weight: 1.0        # scales the graph neighbours' RRF contribution into the fusion
  catalog:                 # attribute each chapter's 'Articles ... at a Glance' table to its sections
    enabled: true          # recovers article numbers PDF extraction stripped from the catalogs
    match: embedding       # 'embedding' = match a section to only its governing article(s) by subject similarity; 'chapter' = legacy coarse whole-chapter union
    score_threshold: 0.30  # min subject<->section cosine to attach an article (embedding mode)
    max_articles: 4        # cap articles attached per section (embedding mode)
    min_articles: 1        # always attach at least this many top-scoring articles, to protect article_recall
  rerank:                  # cross-encoder reranker over the deduped candidate sections (FlashRank, ONNX/CPU, no torch)
    enabled: true          # re-score (query, full-section-text) jointly to promote the right section above its lookalike siblings; bi-encoder RRF can't separate them
    model: ms-marco-MiniLM-L-12-v2  # FlashRank model name; downloaded + cached on first use (~22MB)
    candidate_pool: 25     # how many deduped sections to feed the cross-encoder before truncating to rerank_top_k (wider than rerank_top_k=8 so a #20 RRF section can win)
    max_chars: 2000        # cap section text length sent to the cross-encoder (input is truncated to ~512 tokens anyway; keeps latency flat)
    weight: 0.5            # final = weight*rerank + (1-weight)*RRF (both min-max normalized over the pool). Blend, don't replace: a pure cross-encoder reorder (1.0) demotes some correct RRF #1s and drops sections out of top-k. 0.5 swept best on the gold set (hit@k 93.3->96.7%, MRR 0.693->0.745); 1.0 = pure rerank, 0.0 = pure RRF

generation:
  model: gpt-4o-mini
  temperature: 0.2
  max_tokens: 1024

conversation:                # multi-turn: resolve follow-ups against recent chat history
  enabled: true              # condense follow-ups for retrieval + pass history to the answer LLM
  history_turns: 3           # prior exchanges kept (N questions + N answers = 2N messages)
  condense_model: gpt-4.1-nano   # cheap LLM that rewrites a follow-up into a standalone search query

agent:                       # tool-calling agentic pipeline (UPSC_RAG_PIPELINE=agentic): LLM decides textbook vs web search
  model: gpt-4o-mini         # agent model — must support tool/function calling
  temperature: 0.0           # deterministic tool-routing decisions
  max_iterations: 4          # hard cap on the ReAct agent⇄tools loop (prevents runaway tool use)
  domain_gate_model: gpt-4.1-nano  # cheap yes/no classifier: only Indian-polity questions reach the tools (esp. web)

web_search:                  # DuckDuckGo web tool (free, no API key; ddgs package)
  max_results: 5             # results fetched per web_search tool call
  region: in-en              # DuckDuckGo region bias (India / English) for polity relevance

eval:
  generation:               # cheap generation-quality signals (scripts/evaluate_generation.py) — no LLM judge
    embed_model: text-embedding-3-small  # embedder for groundedness + answer-relevance cosines (cheap; separate from the 3-large corpus model)
    ground_threshold: 0.65  # min cosine(answer-sentence, best source SENTENCE-window) to count a sentence as 'supported'. Raised 0.5->0.65 once groundedness matched sentence windows (not whole sections): window-matching lifts the support floor (mean ~0.76), so 0.5 saturated at ~99% and lost discriminative power
  judge:                    # LLM-as-judge rubric (scripts/evaluate_judge.py) — nuanced criteria the cheap signals can't cover + cross-check of them
    base_url: https://api.openai.com/v1        # OpenAI's endpoint (reuse the openai SDK, only base_url/key differ)
    model: gpt-5-mini                          # stronger, DIFFERENT model than the gpt-4o-mini generator, so it won't rubber-stamp the generator's own style (same-provider self-preference is reduced, not eliminated — accepted trade-off)
    api_key_env: OPENAI_API_KEY                # same key the generator + cheap-signal embeddings use (key: https://platform.openai.com/api-keys)
    temperature: 0.0                           # deterministic scoring for non-reasoning models; IGNORED for gpt-5/o-series (they reject temperature!=1), see judge.py._is_reasoning_model
    reasoning_effort: low                      # gpt-5 reasoning depth for the judge: enough to apply the rubric, low to keep latency/cost down (only used for reasoning models)
    max_source_chars: 3000                     # truncate each source shown to the judge; raised 1500->3000 so the judge sees (nearly) the full parent section the generator saw — several faithfulness/citation dings were content the judge simply couldn't see. No per-day token cap on OpenAI
    request_interval_sec: 0                    # no free-tier per-minute pacing needed on OpenAI's generous paid limits; the rate-limit backoff in judge.py is the safety net

