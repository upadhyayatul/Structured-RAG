name: CI

on:
  push:
    branches: [master, dev]
  pull_request:

jobs:
  # Fast gate — runs on every push/PR, no secrets, no external services.
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: pytest -q
